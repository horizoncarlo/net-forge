<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monaco Editor Demo (No Build)</title>

<style>
body {
    margin: 20px;
    font-family: sans-serif;
}

#editor {
    width: 100%;
    height: 500px;
    border: 1px solid #ccc;
}
</style>
</head>
<body>

<h1>Monaco Editor</h1>

<div id="editor"></div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>

<script>
require.config({
    paths: {
        vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs"
    }
});

require(["vs/editor/editor.main"], function () {

    const editor = monaco.editor.create(document.getElementById("editor"), {
        value: ``,

        language: "html",

        theme: "vs",

        automaticLayout: true,

        fontSize: 14,

        minimap: {
            enabled: false
        },

        lineNumbers: "on",

        tabSize: 4,

        wordWrap: "on",

        autoIndent: "full",

        formatOnType: true,

        formatOnPaste: true,

        suggestOnTriggerCharacters: true
    });

});
</script>

</body>
</html>
