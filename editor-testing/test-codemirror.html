<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeMirror 6 Demo</title>

<style>
body {
    margin: 20px;
    font-family: sans-serif;
}

#editor {
    border: 1px solid #ccc;
    height: 500px;
}

.cm-editor {
    height: 100%;
}

.cm-scroller {
    overflow: auto;
}
</style>
</head>
<body>

<h1>CodeMirror 6</h1>

<div id="editor"></div>

<script type="module">
import {EditorState} from "https://esm.sh/@codemirror/state";

import {
    EditorView,
    keymap,
    lineNumbers,
    highlightActiveLineGutter
} from "https://esm.sh/@codemirror/view";

import {defaultKeymap} from "https://esm.sh/@codemirror/commands";

import {
    autocompletion,
    closeBrackets,
    closeBracketsKeymap
} from "https://esm.sh/@codemirror/autocomplete";

import {html} from "https://esm.sh/@codemirror/lang-html";

import {defaultHighlightStyle, syntaxHighlighting} from "https://esm.sh/@codemirror/language";

const state = EditorState.create({
    doc: ``,
    extensions: [

        // Line numbers
        lineNumbers(),
        highlightActiveLineGutter(),

        // Syntax highlighting
        syntaxHighlighting(defaultHighlightStyle),

        // HTML (includes embedded CSS and JavaScript)
        html(),

        // Autocomplete
        autocompletion(),

        // Auto-close brackets and quotes
        closeBrackets(),

        // Standard key bindings
        keymap.of([
            ...defaultKeymap,
            ...closeBracketsKeymap
        ])
    ]
});

new EditorView({
    state,
    parent: document.getElementById("editor")
});
</script>

</body>
</html>
