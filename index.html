    </script>

    <style>
      :root {
        --divider-color: goldenrod;
        --toolbar-min-height: 28px;
      }

      * {
        box-sizing: border-box;
      }

      .toolbar * {
        font-family: monospace;
      }

      html,
      body {
        padding: 0;
        margin: 0;
        height: 100%;
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .icon {
        width: 1em;
        height: 1em;
        fill: currentColor;
        flex: none;
        vertical-align: -0.125em;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        padding: 6px;
      }

      .toolbar,
      .split-grid.horizontal .split-divider {
        background: radial-gradient(
          circle,
          var(--divider-color) 0%,
          black 80%
        );
      }

      .toolbar a,
      .toolbar button,
      .toolbar select {
        min-height: var(--toolbar-min-height);
      }

      .toolbar a {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border: 1px solid buttonborder;
        background: buttonface;
        color: buttontext;
        text-decoration: none;
      }

      .toolbar a.hidden {
        display: none;
      }

      .toolbar-line, .status {
        color: white;
      }

      .toolbar-spacer {
        flex: 1;
      }
      
      #folder, #page, #theme {
        width: 150px;
      }

      #publish.confirming {
        box-shadow: 0 0 10px greenyellow;
        color: seagreen;
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: var(--toolbar-min-height);
        text-shadow: 0 0 2px black;
      }

      .status.status-error {
        color: red;
        font-weight: bold;
        font-size: 1.5em;
      }

      .split-grid {
        display: grid;
        height: 100%;
        min-height: 0;
      }

      .split-grid.vertical {
        grid-template-columns: 1fr 12px 1fr;
        grid-template-rows: 1fr;
      }

      .split-grid.horizontal {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 12px 1fr;
      }

      .split-grid.vertical .split-left {
        grid-column: 1;
        grid-row: 1;
      }

      .split-grid.vertical .split-divider {
        grid-column: 2;
        grid-row: 1;
        cursor: col-resize;
        background: linear-gradient(
          0deg,
          black 20%,
          var(--divider-color) 100%
        );
      }

      .split-grid.vertical .split-right {
        grid-column: 3;
        grid-row: 1;
      }

      .split-grid.horizontal .split-left {
        grid-column: 1;
        grid-row: 1;
      }

      .split-grid.horizontal .split-divider {
        grid-column: 1;
        grid-row: 2;
        cursor: row-resize;
      }

      .split-grid.horizontal .split-right {
        grid-column: 1;
        grid-row: 3;
      }

      .split-left,
      .split-right {
        min-width: 0;
        min-height: 0;
      }

      .code-editor, iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 5px inset gray;
      }
    </style>

    <script>
      const STORAGE_PAGE_CONTENT = "ourPageContent";
      const STORAGE_PAGE_SELECTION = "ourPageName";
      const STORAGE_EDITOR_THEME = "ourEditorTheme";
      const STORAGE_DIVIDER_HORIZONTAL = "ourDivider";
      const DEFAULT_PAGE_NAME = "index.html";
      const OPTIONAL_API_URL = location.protocol === "file:"
        ? "http://localhost:5000"
        : "";

      const DEFAULT_PAGE_CONTENT = `<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
  </head>
  <body>
    <h1>Welcome to Netforge - make some changes!</h1>
  </body>
</html>`;

      let codeInput;
      let codeOutput;
      let codeDivider;
      let splitGrid;
      let splitInstance;
      let isHorizontalSplit = false;
      let isPublishConfirming = false;
      let statusTimeout = null; // Clear the status text after a while
      let frameTimeout = null; // Debounce iframe output updates

      const appState = {
        online: false,
        root: "",
        host: "",
        files: [],
        page: DEFAULT_PAGE_NAME,
      };

      const util = {
        setCSSProperty(propertyNameWithDashes, value) {
          document.documentElement.style.setProperty(
            propertyNameWithDashes,
            value,
          );
        },

        getRandomColor() {
          const letters = "0123456789ABCDEF";
          let color = "#";

          for (let i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
          }

          return color;
        },

        async api(path, options) {
          const response = await fetch(`${OPTIONAL_API_URL}/api${path}`, {
            ...options,
          });

          if (!response.ok) {
            let message = await response.text();

            try {
              const json = JSON.parse(message);
              message = json.error || message;
            } catch (_error) {
              // Keep raw text if it was not JSON
            }

            throw new Error(message);
          }

          return response;
        },
      };

      // Initialize the page properly
      window.addEventListener("load", () => {
        codeInput = ace.edit("input");
        codeOutput = document.getElementById("output");
        codeDivider = document.getElementById("divider");
        splitGrid = document.getElementById("split-grid");

        loadEditorThemes();
        codeInput.session.setMode("ace/mode/html");
        codeInput.setOptions({
          fontSize: "14px",
          showLineNumbers: true,
          showGutter: true,
          highlightActiveLine: true,
          showPrintMargin: false,
          enableBasicAutocompletion: true,
          enableLiveAutocompletion: true,
          wrap: true,
          tabSize: 2,
          useSoftTabs: true,
        });

        codeInput.textInput.getElement().addEventListener("keyup", () => {
          updateOutput();
        });
        
        requestAnimationFrame(() => {
          createDivider();
          loadLocalContent();
          loadBackend(true);
          
          // Load any previous horizontal split divider state
          const needDividerToggle = ("true" === (localStorage.getItem(STORAGE_DIVIDER_HORIZONTAL) || "false"));
          if (needDividerToggle) {
            toggleSplitDirection();
          }
        });
      });

      // Global error handlers to show in the header
      window.addEventListener("error", (event) => {
        console.error(event.error);

        setStatus(
          event.error?.message ||
            event.message ||
            "Unexpected error",
          true,
          false,
        );
      });
      window.addEventListener("unhandledrejection", (event) => {
        console.error(event.reason);

        setStatus(
          event.reason?.message ||
            String(event.reason) ||
            "Unexpected async error",
          true,
          false,
        );
      });

      // Clear confirm publish status when clicking elsewhere
      window.addEventListener("click", (event) => {
        if (!isPublishConfirming) {
          return;
        }

        if (event.target.closest("#publish")) {
          return;
        }

        resetPublishButton();
      });
      
      // Hotkey support
      window.addEventListener("keydown", async (event) => {
        // For now ONLY care about Ctrl+S, because it's such a reflex that it should do something
        if (!(event.ctrlKey || event.metaKey) || event.key.toLowerCase() !== "s") {
          return;
        }

        event.preventDefault();

        if (!appState.online) {
          setStatus("Cannot publish while offline", true);
          return;
        }

        await publishPage(true);
      });

      async function loadBackend(updateStatus = false) {
        try {
          const response = await util.api("/me");
          const me = await response.json();

          appState.online = true;
          appState.root = me.root || "";
          appState.host = me.host || "";
          appState.files = Array.isArray(me.files) ? me.files : [];

          updateToolbar();

          if (appState.files.length) {
            const savedPage = localStorage.getItem(STORAGE_PAGE_SELECTION);

            appState.page = appState.files.includes(savedPage)
              ? savedPage
              : appState.files[0];

            document.getElementById("page").value = appState.page;
            await loadPage();
          } else {
            appState.page = DEFAULT_PAGE_NAME;
            codeInput.setValue(DEFAULT_PAGE_CONTENT, 1);
            updateOutput();
            updateToolbar();
          }

          if (updateStatus) {
            setStatus(`Connected: ${appState.root || "root"}`);
          }
        } catch (_error) {
          appState.online = false;
          updateToolbar();

          if (updateStatus) {
            setStatus("Offline Mode", false, false);
          }
        }
      }

      function loadLocalContent() {
        appState.page = localStorage.getItem(STORAGE_PAGE_SELECTION) ||
          DEFAULT_PAGE_NAME;

        let saved = localStorage.getItem(STORAGE_PAGE_CONTENT);

        if (!saved?.trim().length) {
          saved = DEFAULT_PAGE_CONTENT;
        }

        codeInput.setValue(saved, 1);
        updateOutput();
        updateToolbar();
      }

      function updateToolbar() {
        const folderIn = document.getElementById("folder");
        const pageIn = document.getElementById("page");
        const pageLine = document.getElementById("page-line");
        const viewBtn = document.getElementById("view");
        const createBtn = document.getElementById("create");
        const deleteBtn = document.getElementById("delete");
        const renameBtn = document.getElementById("rename");
        const publishBtn = document.getElementById("publish");

        folderIn.innerHTML = "";
        pageIn.innerHTML = "";

        folderIn.add(
          new Option(
            appState.online ? appState.root || "root" : "offline",
            appState.root,
          ),
        );

        const files = appState.files.length
          ? appState.files
          : [appState.page || DEFAULT_PAGE_NAME];

        for (const file of files) {
          pageIn.add(new Option(file, file));
        }

        pageIn.value = appState.page;

        folderIn.hidden = !appState.online;
        pageIn.hidden = !appState.online;
        pageLine.hidden = !appState.online;
        createBtn.hidden = !appState.online;
        deleteBtn.hidden = !appState.online;
        renameBtn.hidden = !appState.online;
        publishBtn.hidden = !appState.online;

        if (appState.online) {
          viewBtn.href = getViewUrl();
          viewBtn.classList.remove("hidden");
        } else {
          viewBtn.removeAttribute("href");
          viewBtn.classList.add("hidden");
        }
      }

      function setStatus(message, isError = false, doClear = true) {
        const status = document.getElementById("status");

        status.textContent = message;
        status.classList.toggle("status-error", isError);

        // Automatically clear the status after a few seconds
        if (statusTimeout) {
          clearTimeout(statusTimeout);
        }

        if (doClear) {
          statusTimeout = setTimeout(() => {
            status.textContent = "";
          }, 3000);
        }
      }

      function getViewUrl() {
        const host = appState.host || "/sites/";
        const page = encodeURIComponent(appState.page);

        if (!appState.root) {
          return `${host}${page}`;
        }

        return `${host}${encodeURIComponent(appState.root)}/${page}`;
      }

      async function loadPage(updateStatus = false) {
        if (!appState.online) {
          return;
        }

        appState.page = document.getElementById("page").value;
        localStorage.setItem(STORAGE_PAGE_SELECTION, appState.page);

        const response = await util.api(
          `/get/${encodeURIComponent(appState.page)}`,
        );
        const content = await response.text();

        codeInput.setValue(content, 1);
        updateOutput();
        updateToolbar();

        if (updateStatus) {
          setStatus(`Loaded ${appState.page}`);
        }
      }

      async function createPage() {
        if (!appState.online) {
          return;
        }

        const newName = prompt("New filename", "new.html");

        if (!newName) {
          return;
        }

        await util.api(`/create/${encodeURIComponent(newName)}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
        });

        appState.page = newName;
        localStorage.setItem(STORAGE_PAGE_SELECTION, appState.page);
        setStatus(`Created ${appState.page}`);
        await loadBackend();
      }

      async function deletePage() {
        if (!appState.online) {
          return;
        }

        if (!confirm(`Delete ${appState.page}?`)) {
          return;
        }

        await util.api(`/delete/${encodeURIComponent(appState.page)}`, {
          method: "DELETE",
        });

        setStatus(`Deleted ${appState.page}`);
        await loadBackend();
      }

      async function renamePage() {
        if (!appState.online) {
          return;
        }

        const newName = prompt("New filename", appState.page);

        if (!newName) {
          return;
        }

        await util.api(`/rename/${encodeURIComponent(appState.page)}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            newName,
          }),
        });

        appState.page = newName;
        localStorage.setItem(STORAGE_PAGE_SELECTION, appState.page);
        setStatus(`Renamed to ${appState.page}`);
        await loadBackend();
      }

      async function publishPage(noConfirm = false) {
        if (!appState.online) {
          return;
        }

        const publishBtn = document.getElementById("publish");

        if (!noConfirm && !isPublishConfirming) {
          isPublishConfirming = true;
          publishBtn.classList.add("confirming");
          publishBtn.innerText = "CONFIRM";
          setStatus(
            `Confirm sending ${appState.page} to the server?`,
            false,
            false,
          );

          return;
        }

        await util.api(`/publish/${encodeURIComponent(appState.page)}`, {
          method: "POST",
          headers: {
            "Content-Type": "text/html; charset=utf-8",
          },
          body: codeInput.getValue(),
        });

        resetPublishButton();
        setStatus(`YAY! Published ${appState.page}`);
      }

      function resetPublishButton() {
        const publishBtn = document.getElementById("publish");

        isPublishConfirming = false;
        publishBtn.classList.remove("confirming");
        publishBtn.innerText = "PUBLISH";
      }

      function updateOutput() {
        const value = codeInput.getValue() ?? "";

        localStorage.setItem(STORAGE_PAGE_CONTENT, value);
        
        if (frameTimeout) {
          clearTimeout(frameTimeout);
        }
        
        frameTimeout = setTimeout(() => {
          codeOutput.srcdoc = value;
        }, 200);
      }

      function createDivider() {
        if (splitInstance) {
          splitInstance.destroy();
        }

        if (isHorizontalSplit) {
          splitInstance = Split({
            rowGutters: [
              {
                track: 1,
                element: codeDivider,
              },
            ],
          });
        } else {
          splitInstance = Split({
            columnGutters: [
              {
                track: 1,
                element: codeDivider,
              },
            ],
          });
        }

        util.setCSSProperty("--divider-color", util.getRandomColor());
      }

      function toggleSplitDirection() {
        // Clear any set values in case of dragging the divider
        splitGrid.style.gridTemplateColumns = "";
        splitGrid.style.gridTemplateRows = "";

        isHorizontalSplit = !isHorizontalSplit;
        
        localStorage.setItem(STORAGE_DIVIDER_HORIZONTAL, isHorizontalSplit);

        splitGrid.classList.toggle("vertical", !isHorizontalSplit);
        splitGrid.classList.toggle("horizontal", isHorizontalSplit);

        requestAnimationFrame(() => {
          createDivider();
          codeInput.resize();
        });
      }

      function loadEditorThemes() {
        const themeSelect = document.getElementById("theme");
        const themes = ace.require("ace/ext/themelist").themes;

        const lightThemes = themes
          .filter((theme) => !theme.isDark)
          .sort((a, b) => a.caption.localeCompare(b.caption));

        const darkThemes = themes
          .filter((theme) => theme.isDark)
          .sort((a, b) => a.caption.localeCompare(b.caption));

        themeSelect.innerHTML = "";

        const lightGroup = document.createElement("optgroup");
        lightGroup.label = "Light";

        for (const theme of lightThemes) {
          lightGroup.appendChild(new Option(theme.caption, theme.theme));
        }

        const darkGroup = document.createElement("optgroup");
        darkGroup.label = "Dark";

        for (const theme of darkThemes) {
          darkGroup.appendChild(new Option(theme.caption, theme.theme));
        }

        themeSelect.appendChild(lightGroup);
        themeSelect.appendChild(darkGroup);

        themeSelect.value = localStorage.getItem(STORAGE_EDITOR_THEME) ||
          "ace/theme/eclipse";

        setEditorTheme(themeSelect.value);
      }

      function setEditorTheme(theme) {
        codeInput.setTheme(theme);
        localStorage.setItem(STORAGE_EDITOR_THEME, theme);
      }
    </script>
  </head>

  <body>
    <div class="toolbar">
      <select id="folder" hidden>
        <option>offline</option>
      </select>

      <b id="page-line" class="toolbar-line" hidden>/</b>

      <select id="page" onchange="loadPage(true)" hidden>
        <option>index.html</option>
      </select>

      <b class="toolbar-line">&nbsp;|&nbsp;</b>

      <button id="create" onclick="createPage()" hidden>
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M6 2h9l5 5v15H6V2zm8 2v5h4l-4-5z"></path>
          <path d="M11 11h2v3h3v2h-3v3h-2v-3H8v-2h3v-3z"></path>
        </svg>
        Create
      </button>

      <button id="delete" onclick="deletePage()" hidden>
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M9 3h6l1 2h5v2H3V5h5l1-2z"></path>
          <path d="M6 9h12l-1 12H7L6 9zm4 2v8h2v-8h-2zm4 0v8h2v-8h-2z"></path>
        </svg>
        Delete
      </button>

      <button id="rename" onclick="renamePage()" hidden>
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M4 17.25V21h3.75L18.81 9.94l-3.75-3.75L4 17.25z"></path>
          <path
            d="M20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.13 1.13 3.75 3.75 1.13-1.13z"
          >
          </path>
        </svg>
        Rename
      </button>

      <button
        id="publish"
        onclick="publishPage()"
        style="font-weight: bold"
        hidden
      >
        PUBLISH
      </button>
      
      <span id="status" class="status">
        Loading...
      </span>

      <span class="toolbar-spacer"></span>
      
      <button onclick="toggleSplitDirection()">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M4 3h6v14H4V3z"></path>
          <path d="M14 5h3V3l4 4-4 4V9h-3V5z"></path>
          <path d="M10 14h11v6H10v-6z"></path>
        </svg>
        Change Divider
      </button>

      <select id="theme" onchange="setEditorTheme(this.value)">
        <option value="ace/theme/eclipse">Eclipse</option>
      </select>
      
      <b class="toolbar-line">&nbsp;|&nbsp;</b>

      <a id="view" class="hidden" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3z"></path>
          <path d="M5 5h6v2H7v10h10v-4h2v6H5V5z"></path>
        </svg>
        View
      </a>

      <a href="https://www.w3schools.com/html/" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24">
          <path
            d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm6.93 9h-3.08a15.7 15.7 0 0 0-1.19-5.03A8.03 8.03 0 0 1 18.93 11zM12 4.04c.74 1.08 1.55 3.32 1.8 6.96h-3.6c.25-3.64 1.06-5.88 1.8-6.96zM4.26 13h3.89c.11 1.95.43 3.7.9 5.03A8.03 8.03 0 0 1 4.26 13zm3.89-2H4.26a8.03 8.03 0 0 1 4.79-5.03A15.7 15.7 0 0 0 8.15 11zM12 19.96c-.74-1.08-1.55-3.32-1.8-6.96h3.6c-.25 3.64-1.06 5.88-1.8 6.96zm2.95-1.93c.47-1.33.79-3.08.9-5.03h3.08a8.03 8.03 0 0 1-3.98 5.03z"
          >
          </path>
        </svg>
        W3C
      </a>

      <a
        href="https://developer.mozilla.org/en-US/docs/Web/HTML/Reference"
        target="_blank"
        rel="noopener"
      >
        <svg class="icon" viewBox="0 0 24 24">
          <path
            d="M5 3h10l4 4v14H5V3zm9 2v4h4l-4-4zM7 11h10v2H7v-2zm0 4h10v2H7v-2z"
          >
          </path>
          <path d="M3 6h2v15h12v2H3V6z"></path>
        </svg>
        MDN
      </a>
    </div>

    <div id="split-grid" class="split-grid vertical">
      <div class="split-left">
        <div id="input" class="code-editor"></div>
      </div>

      <div id="divider" class="split-divider"></div>

      <div class="split-right">
        <iframe id="output" sandbox="allow-scripts allow-forms"></iframe>
      </div>
    </div>
  </body>
</html>
